<div class="asset-search">
  <p-autoComplete
    [ngModel]="value()"
    (ngModelChange)="value.set($event)"
    [suggestions]="suggestions()"
    (completeMethod)="onSearch($event)"
    (onSelect)="onSelect($event.value)"
    (onClear)="onClear()"
    [dropdown]="true"
    [showClear]="true"
    [disabled]="disabled()"
    [placeholder]="placeholder()"
    optionLabel="inventoryNumber"
    dataKey="id"
    appendTo="body"
    styleClass="asset-search__input"
    panelStyleClass="asset-search__panel"
  >
    <ng-template #selectedItem let-asset>
      <div class="asset-search__selected">
        <span class="asset-search__inv">{{ asset.inventoryNumber }}</span>
        <span class="asset-search__desc">{{ asset.description }}</span>
      </div>
    </ng-template>

    <ng-template #item let-asset>
      <div class="asset-search__option">
        <div class="asset-search__option-top">
          <span class="asset-search__option-inv">{{ asset.inventoryNumber }}</span>
          <p-tag
            [value]="getConditionLabel(asset.conditionStatus)"
            [severity]="getConditionSeverity(asset.conditionStatus)"
            styleClass="asset-search__cond-tag"
          />
        </div>
        <div class="asset-search__option-desc">{{ asset.description }}</div>
        <div class="asset-search__option-meta">
          {{ asset.brandName }} {{ asset.model }} · {{ asset.locationName }}
        </div>
      </div>
    </ng-template>

    <ng-template #empty>
      <div class="asset-search__empty">
        <i class="pi pi-search"></i>
        <span>Sin resultados. Intenta con otro término.</span>
      </div>
    </ng-template>
  </p-autoComplete>
</div>
